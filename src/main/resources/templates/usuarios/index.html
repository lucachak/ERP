<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark" xmlns:th="http://www.thymeleaf.org" xmlns:hx-on="http://www.w3.org/1999/xhtml">

<head th:replace="~{fragmentos/cabecalho :: head('Usuários - Cambiomatic')}"></head>

<body>
<div th:replace="~{fragmentos/cabecalho :: navbar}"></div>

<div class="container mt-4 mb-5">
    
    <!-- Alertas (Flash Messages) -->
    <div th:if="${mensagemSucesso}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${mensagemSucesso}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${mensagemErro}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${mensagemErro}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="page-header mb-4 border-bottom" style="border-color: var(--border-subtle) !important; padding-bottom: 24px;">
        <div>
            <span class="page-eyebrow">// controle de acessos</span>
            <h1 class="page-title">GERENCIAR USUÁRIOS</h1>
        </div>
        <div class="d-flex gap-3 align-items-center flex-wrap">
            <button type="button" class="btn-primary-custom text-nowrap" data-bs-toggle="modal" data-bs-target="#modalUsuario" onclick="limparFormulario()">
                <i data-lucide="user-plus" width="18" height="18"></i> Novo Usuário
            </button>
        </div>
    </div>

    <div class="glass-card overflow-hidden">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table-dark-custom">
                    <thead style="background: rgba(0,0,0,0.2);">
                    <tr>
                        <th class="ps-4">ID</th>
                        <th>Nome de Utilizador</th>
                        <th>Cargo (Nível de Acesso)</th>
                        <th class="text-end pe-4">Ação</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="u : ${usuarios}" th:id="'linha-' + ${u.id}">
                        <td class="ps-4" style="font-family: var(--font-mono); font-weight: 600; color: var(--text-muted); font-size: 14px;" th:text="'#' + ${u.id}">#1</td>
                        <td>
                            <strong style="color: var(--text-primary); font-size: 15px; text-transform: lowercase;" th:text="${u.username}">lucas.admin</strong>
                        </td>
                        <td>
                            <span th:if="${u.role == 'ROLE_ADMIN'}" class="badge bg-danger">ADMIN (Chefe)</span>
                            <span th:if="${u.role == 'ROLE_ATENDENTE'}" class="badge bg-primary">MECÂNICO / ATENDENTE</span>
                        </td>
                        <td class="text-end pe-4">
                            <div class="d-flex gap-2 justify-content-end">
                                <button class="btn-outline-custom p-2" title="Editar" 
                                        th:attr="onclick=|abrirEdicao(${u.id}, '${u.username}', '${u.role}')|">
                                    <i data-lucide="edit" width="16" height="16"></i>
                                </button>
                                <!-- Não pode excluir a si mesmo -->
                                <button th:if="${#authentication.name != u.username}" class="btn-outline-custom p-2" title="Excluir" style="color: var(--col-danger); border-color: rgba(248,113,113,0.3);"
                                        th:attr="hx-delete=@{/usuarios/{id}/excluir(id=${u.id})}"
                                        hx-confirm="Tem certeza que deseja excluir este usuário do sistema?"
                                        th:hx-target="'#linha-' + ${u.id}"
                                        hx-swap="outerHTML">
                                    <i data-lucide="trash-2" width="16" height="16"></i>
                                </button>
                                <button th:if="${#authentication.name == u.username}" class="btn-outline-custom p-2" disabled title="Você não pode excluir a si mesmo" style="opacity: 0.3;">
                                    <i data-lucide="trash-2" width="16" height="16"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(usuarios)}">
                        <td colspan="4" class="text-center py-5" style="color: var(--text-muted);">
                            <i data-lucide="users" width="48" height="48" class="mb-3 opacity-50"></i><br>
                            Nenhum usuário cadastrado.
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Modal Salvar/Editar -->
<div class="modal fade" id="modalUsuario" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content border-0" style="border-top: 3px solid var(--col-aberta) !important;">
            <div class="modal-header py-3">
                <h6 class="modal-title" id="modalTitulo" style="font-family: var(--font-display); letter-spacing: 1px; color: var(--text-primary);">
                    NOVO USUÁRIO
                </h6>
                <button type="button" class="btn-close btn-close-white" style="opacity: 0.5;" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <form action="/usuarios/salvar" method="post">
                    <input type="hidden" name="id" id="inputId">
                    
                    <div class="mb-3">
                        <label class="form-label" style="font-size: 14px; color: var(--text-secondary);">Nome de Utilizador *</label>
                        <input type="text" name="username" id="inputUsername" class="form-control" style="text-transform: lowercase;" required placeholder="Ex: joao.mecanico">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label" style="font-size: 14px; color: var(--text-secondary);">Nível de Acesso *</label>
                        <select name="role" id="inputRole" class="form-select" required>
                            <option value="ROLE_ATENDENTE">Mecânico / Atendente (Padrão)</option>
                            <option value="ROLE_ADMIN">Administrador (Chefe)</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label" style="font-size: 14px; color: var(--text-secondary);">Senha <span id="senhaObrigatorio">*</span></label>
                        <input type="password" name="password" id="inputPassword" class="form-control" placeholder="Digite a senha..." required>
                        <small id="senhaDica" class="text-muted" style="display: none; font-size: 12px; margin-top: 4px;">Deixe em branco para manter a senha atual.</small>
                    </div>

                    <div class="d-flex justify-content-end gap-2">
                        <button type="button" class="btn-outline-custom" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn-primary-custom" style="background: var(--col-aberta); color: #fff;">
                            <i data-lucide="save" width="16" height="16"></i> Salvar Usuário
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    function limparFormulario() {
        document.getElementById('modalTitulo').innerText = 'NOVO USUÁRIO';
        document.getElementById('inputId').value = '';
        document.getElementById('inputUsername').value = '';
        document.getElementById('inputRole').value = 'ROLE_ATENDENTE';
        document.getElementById('inputPassword').value = '';
        
        // Exigir senha
        document.getElementById('inputPassword').required = true;
        document.getElementById('senhaObrigatorio').style.display = 'inline';
        document.getElementById('senhaDica').style.display = 'none';
    }

    function abrirEdicao(id, username, role) {
        document.getElementById('modalTitulo').innerText = 'EDITAR USUÁRIO';
        document.getElementById('inputId').value = id;
        document.getElementById('inputUsername').value = username;
        document.getElementById('inputRole').value = role;
        document.getElementById('inputPassword').value = '';
        
        // Não exigir senha (só altera se digitar)
        document.getElementById('inputPassword').required = false;
        document.getElementById('senhaObrigatorio').style.display = 'none';
        document.getElementById('senhaDica').style.display = 'block';
        
        var modal = new bootstrap.Modal(document.getElementById('modalUsuario'));
        modal.show();
    }
</script>

</body>
</html>
