<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragmentos/cabecalho :: head('Agenda de Serviços - Cambiomatic')}"></head>

<body>
<div th:replace="~{fragmentos/cabecalho :: navbar}"></div>

<div class="container mt-4 mb-5">

  <div class="page-header mb-4">
    <div>
      <span class="page-eyebrow">// planejamento e horários</span>
      <h1 class="page-title">AGENDA DE SERVIÇOS</h1>
    </div>
    <div class="d-flex gap-3 align-items-center">
      <form action="/agenda" method="get" class="date-filter-box">
        <label class="small text-muted fw-bold mb-0 text-uppercase" style="font-size: 11px; letter-spacing: 1px;"><i data-lucide="calendar" width="14" height="14" class="me-1" style="margin-top: -2px;"></i> Dia:</label>
        <input type="date" name="data" th:value="${dataAtual}" onchange="this.form.submit()">
      </form>
      <button class="btn-primary-custom" data-bs-toggle="modal" data-bs-target="#modalNovoAgendamento">
        <i data-lucide="calendar-plus" width="18" height="18"></i> Novo Agendamento
      </button>
    </div>
  </div>

  <div class="glass-card border-0">
    <div class="glass-header text-white">
      <i data-lucide="list-todo" width="20" height="20" class="me-2" style="color: var(--col-aberta);"></i> Agendamentos para <span class="ms-2" style="color: var(--text-primary);" th:text="${#temporals.format(T(java.time.LocalDate).parse(dataAtual), 'dd/MM/yyyy')}"></span>
    </div>
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table-dark-custom">
          <thead style="background: rgba(0,0,0,0.2);">
          <tr>
            <th class="ps-4">Horário</th>
            <th>Cliente e Contato</th>
            <th>Veículo</th>
            <th>Serviço Desejado</th>
            <th>Status</th>
            <th class="text-end pe-4">Ação</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="a : ${agendamentos}">
            <td class="ps-4 fw-bold fs-5" style="color: var(--col-aberta); font-family: var(--font-mono);" th:text="${#temporals.format(a.dataHora, 'HH:mm')}"></td>
            <td>
              <strong class="d-block" style="color: var(--text-primary); font-size: 14px;" th:text="${a.nomeCliente}"></strong>
              <span style="color: var(--text-muted); font-family: var(--font-mono); font-size: 12px;" th:text="${a.telefone}"></span>
            </td>
            <td style="color: var(--text-secondary); font-weight: 500;" th:text="${a.veiculo}"></td>
            <td style="color: var(--text-secondary);" th:text="${a.servicoDesejado}"></td>
            <td>
                            <span class="badge-custom"
                                  th:style="${a.status == 'Pendente' ? 'color: var(--col-aguardando); background: var(--col-aguardando-bg); border-color: var(--col-aguardando)' :
                                            (a.status == 'Chegou' ? 'color: var(--col-encerrada); background: var(--col-encerrada-bg); border-color: var(--col-encerrada)' :
                                            'color: var(--col-danger); background: var(--col-danger-bg); border-color: var(--col-danger)')}"
                                  th:text="${a.status}">
                            </span>
            </td>
            <td class="text-end pe-4">
              <form th:action="@{/agenda/{id}/status(id=${a.id})}" method="post" class="d-inline">
                <input type="hidden" name="dataAtual" th:value="${dataAtual}">
                <div class="btn-group gap-1">
                  <button type="submit" name="status" value="Pendente" class="btn-action btn-action-warning" title="Marcar como Pendente"><i data-lucide="clock" width="16" height="16"></i></button>
                  <button type="submit" name="status" value="Chegou" class="btn-action btn-action-success" title="Cliente Chegou"><i data-lucide="check" width="16" height="16"></i></button>
                  <button type="submit" name="status" value="Cancelado" class="btn-action btn-action-danger" title="Cancelar"><i data-lucide="x" width="16" height="16"></i></button>
                </div>
              </form>
            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(agendamentos)}">
            <td colspan="6" class="text-center py-5 text-muted">
              <i data-lucide="calendar-x-2" width="48" height="48" class="mb-3 opacity-50"></i><br>
              Não há serviços agendados para este dia.
            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="modalNovoAgendamento" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content border-0" style="border-top: 3px solid var(--col-aberta) !important;">
      <div class="modal-header border-bottom border-secondary border-opacity-25 py-3">
        <h6 class="modal-title" style="font-family: var(--font-display); letter-spacing: 1px; color: var(--text-primary);"><i data-lucide="calendar-plus" width="20" height="20" class="me-2" style="color: var(--col-aberta); margin-top: -4px;"></i> MARCAR HORÁRIO</h6>
        <button type="button" class="btn-close btn-close-white" style="opacity: 0.5;" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-4">
        <form action="/agenda/novo" method="post">
          <div class="mb-3">
            <label class="form-label text-muted small fw-bold">Data e Hora *</label>
            <input type="datetime-local" name="dataHora" class="form-control" style="font-family: var(--font-mono);" required th:value="${dataAtual + 'T08:00'}">
          </div>
          <div class="row">
            <div class="col-7 mb-3">
              <label class="form-label text-muted small fw-bold">Nome do Cliente *</label>
              <input type="text" name="nomeCliente" class="form-control" required placeholder="Ex: Sr. João">
            </div>
            <div class="col-5 mb-3">
              <label class="form-label text-muted small fw-bold">Telefone</label>
              <input type="text" name="telefone" class="form-control" placeholder="(11) 9...">
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label text-muted small fw-bold">Veículo *</label>
            <input type="text" name="veiculo" class="form-control" required placeholder="Ex: Prisma Branco">
          </div>
          <div class="mb-4">
            <label class="form-label text-muted small fw-bold">Serviço Desejado</label>
            <input type="text" name="servicoDesejado" class="form-control" placeholder="Ex: Verificação de vazamento">
          </div>
          <button type="submit" class="btn-primary-custom w-100 justify-content-center text-uppercase" style="font-size: 14px;">Confirmar Agendamento</button>
        </form>
      </div>
    </div>
  </div>
</div>

</body>
</html>
