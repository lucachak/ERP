<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark" xmlns:th="http://www.thymeleaf.org" xmlns:hx-on="http://www.w3.org/1999/xhtml">

<head th:replace="~{fragmentos/cabecalho :: head('Tabela de Serviços - Cambiomatic')}"></head>

<body>
<div th:replace="~{fragmentos/cabecalho :: navbar}"></div>

<div class="container mt-4 mb-5">
    <div class="page-header mb-4 border-bottom" style="border-color: var(--border-subtle) !important; padding-bottom: 24px;">
        <div>
            <span class="page-eyebrow">// base de dados de serviços</span>
            <h1 class="page-title">TABELA DE SERVIÇOS</h1>
        </div>
        <div class="d-flex gap-3 align-items-center flex-wrap">
            <button type="button" class="btn-primary-custom text-nowrap" data-bs-toggle="modal" data-bs-target="#modalServico" onclick="limparFormulario()">
                <i data-lucide="plus" width="18" height="18"></i> Novo Serviço Padrão
            </button>
        </div>
    </div>

    <div class="glass-card overflow-hidden">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table-dark-custom">
                    <thead style="background: rgba(0,0,0,0.2);">
                    <tr>
                        <th class="ps-4">ID</th>
                        <th>Descrição do Serviço</th>
                        <th>Valor Fixo (R$)</th>
                        <th class="text-end pe-4">Ação</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="servico : ${servicos}" th:id="'linha-' + ${servico.id}">
                        <td class="ps-4" style="font-family: var(--font-mono); font-weight: 600; color: var(--text-muted); font-size: 14px;" th:text="'#' + ${servico.id}">#1</td>
                        <td>
                            <strong style="color: var(--text-primary); font-size: 15px;" th:text="${servico.descricao}">CARGA DE GÁS</strong>
                        </td>
                        <td>
                            <span style="font-family: var(--font-mono); color: var(--col-aberta); font-size: 15px; font-weight: 600;" 
                                  th:text="${#numbers.formatDecimal(servico.valorPadrao, 1, 'POINT', 2, 'COMMA')}">
                                0,00
                            </span>
                        </td>
                        <td class="text-end pe-4">
                            <div class="d-flex gap-2 justify-content-end">
                                <button class="btn-outline-custom p-2" title="Editar" 
                                        th:attr="onclick=|abrirEdicao(${servico.id}, '${servico.descricao}', ${servico.valorPadrao})|">
                                    <i data-lucide="edit" width="16" height="16"></i>
                                </button>
                                <button class="btn-outline-custom p-2" title="Excluir" style="color: var(--col-danger); border-color: rgba(248,113,113,0.3);"
                                        th:attr="hx-delete=@{/servicos-padrao/{id}/excluir(id=${servico.id})}"
                                        hx-confirm="Tem certeza que deseja excluir este serviço do catálogo?"
                                        th:hx-target="'#linha-' + ${servico.id}"
                                        hx-swap="outerHTML">
                                    <i data-lucide="trash-2" width="16" height="16"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(servicos)}">
                        <td colspan="4" class="text-center py-5" style="color: var(--text-muted);">
                            <i data-lucide="list-x" width="48" height="48" class="mb-3 opacity-50"></i><br>
                            Nenhum serviço cadastrado.
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Modal Salvar/Editar -->
<div class="modal fade" id="modalServico" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content border-0" style="border-top: 3px solid var(--col-aberta) !important;">
            <div class="modal-header py-3">
                <h6 class="modal-title" id="modalTitulo" style="font-family: var(--font-display); letter-spacing: 1px; color: var(--text-primary);">
                    NOVO SERVIÇO PADRÃO
                </h6>
                <button type="button" class="btn-close btn-close-white" style="opacity: 0.5;" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <form action="/servicos-padrao/salvar" method="post">
                    <input type="hidden" name="id" id="inputServicoId">
                    
                    <div class="mb-3">
                        <label class="form-label" style="font-size: 14px; color: var(--text-secondary);">Descrição do Serviço *</label>
                        <input type="text" name="descricao" id="inputDescricao" class="form-control" required placeholder="Ex: CARGA DE GÁS">
                    </div>
                    <div class="mb-4">
                        <label class="form-label" style="font-size: 14px; color: var(--text-secondary);">Valor Fixo (R$) *</label>
                        <input type="number" step="0.01" name="valorPadrao" id="inputValor" class="form-control" required>
                    </div>
                    <div class="d-flex justify-content-end gap-2">
                        <button type="button" class="btn-outline-custom" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn-primary-custom" style="background: var(--col-aberta); color: #fff;">
                            <i data-lucide="save" width="16" height="16"></i> Salvar
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    function limparFormulario() {
        document.getElementById('modalTitulo').innerText = 'NOVO SERVIÇO PADRÃO';
        document.getElementById('inputServicoId').value = '';
        document.getElementById('inputDescricao').value = '';
        document.getElementById('inputValor').value = '';
    }

    function abrirEdicao(id, descricao, valor) {
        document.getElementById('modalTitulo').innerText = 'EDITAR SERVIÇO PADRÃO';
        document.getElementById('inputServicoId').value = id;
        document.getElementById('inputDescricao').value = descricao;
        document.getElementById('inputValor').value = valor;
        
        var modal = new bootstrap.Modal(document.getElementById('modalServico'));
        modal.show();
    }
</script>

</body>
</html>
