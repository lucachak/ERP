<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragmentos/cabecalho :: head('Comissões de Técnicos - Cambiomatic')}"></head>

<body>
<div th:replace="~{fragmentos/cabecalho :: navbar}"></div>

<div class="container mt-4 mb-5">
    <div class="page-header mb-4">
        <div>
            <span class="page-eyebrow">// produtividade</span>
            <h1 class="page-title">RELATÓRIO DE COMISSÕES</h1>
        </div>
        <div class="d-flex align-items-center">
            <div class="date-filter-box" style="background: rgba(0,0,0,0.3); border: 1px solid var(--border-subtle); border-radius: 8px; padding: 4px 16px; display: flex; align-items: center; gap: 12px;">
                <i data-lucide="calendar-check" width="16" height="16" style="color: var(--text-muted);"></i>
                <form action="/relatorios/comissoes" method="get">
                    <input type="month" name="mesAno" th:value="${mesAnoAtual}" onchange="this.form.submit()" style="background: transparent !important; border: none !important; color: var(--col-aberta) !important; font-family: var(--font-mono); font-weight: 600; font-size: 14px; padding: 0; outline: none; box-shadow: none !important; color-scheme: dark;">
                </form>
            </div>
        </div>
    </div>

    <div class="glass-card">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table-dark-custom">
                    <thead style="background: rgba(0,0,0,0.2);">
                    <tr>
                        <th class="ps-4">Técnico / Mecânico</th>
                        <th class="text-center">Qtd. Serviços Realizados</th>
                        <th class="text-end">Total Gerado (R$)</th>
                        <th class="text-end pe-4" style="color: var(--col-aguardando);">Sugestão de Pagamento (50%)</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="linha : ${relatorio}">
                        <td class="ps-4 fw-bold" style="color: var(--col-aberta); font-size: 15px;" th:text="${linha.tecnico()}"></td>
                        <td class="text-center">
                            <span class="px-3 py-1 rounded fw-bold" style="background: rgba(255,255,255,0.05); font-family: var(--font-mono); font-size: 13px; border: 1px solid var(--border-mid);" th:text="${linha.quantidadeServicos()}"></span>
                        </td>
                        <td class="text-end" style="font-family: var(--font-mono); color: var(--text-secondary);">
                            R$ <span th:text="${#numbers.formatDecimal(linha.totalGerado(), 1, 'POINT', 2, 'COMMA')}">0,00</span>
                        </td>
                        <td class="text-end pe-4 fw-bold" style="font-family: var(--font-mono); font-size: 18px; color: var(--col-aguardando);">
                            R$ <span th:text="${#numbers.formatDecimal(linha.totalGerado() * 0.5, 1, 'POINT', 2, 'COMMA')}">0,00</span>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(relatorio)}">
                        <td colspan="4" class="text-center py-5" style="color: var(--text-muted);">
                            <i data-lucide="piggy-bank" width="48" height="48" class="mb-3 opacity-50"></i><br>
                            Nenhum serviço registrado em O.S. encerradas neste mês.
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
