<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:hx-on="http://www.w3.org/1999/xhtml">
<body>

<div th:fragment="formularioCliente" class="glass-card mb-4" style="border: 1px solid var(--col-aberta); box-shadow: 0 0 20px rgba(59,130,246,0.15);">
    <div class="p-3 border-bottom d-flex justify-content-between align-items-center" style="background: var(--col-aberta-bg); border-color: var(--border-subtle) !important; border-radius: 16px 16px 0 0;">
        <h5 class="mb-0" style="font-family: var(--font-display); letter-spacing: 1px; color: var(--text-primary);">
            <i data-lucide="user-plus" width="20" height="20" class="me-2" style="color: var(--col-aberta);"></i>CADASTRAR NOVO CLIENTE
        </h5>
        <button type="button" class="btn-close btn-close-white" style="opacity: 0.5;" hx-get="data:text/html," hx-target="#form-container"></button>
    </div>

    <div class="card-body p-4">
        <form hx-post="/clientes/novo" hx-target="#container-tabela" hx-swap="outerHTML"
              hx-on:htmx:after-request="if(event.detail.successful && event.detail.target.id === 'container-tabela') { document.getElementById('form-container').innerHTML = ''; lucide.createIcons(); }">

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label" style="font-size: 12px; color: var(--text-secondary);">Nome Completo *</label>
                    <input type="text" name="nome" class="form-control" required placeholder="Ex: Sr. João Silva">
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label" style="font-size: 12px; color: var(--text-secondary);">CPF / CNPJ</label>
                    <input type="text" name="cpfCnpj" class="form-control" placeholder="Apenas números">
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label" style="font-size: 12px; color: var(--text-secondary);">Celular</label>
                    <input type="text" name="celular" class="form-control" placeholder="(11) 9...">
                </div>
            </div>

            <div class="row">
                <div class="col-md-5 mb-3">
                    <label class="form-label" style="font-size: 12px; color: var(--text-secondary);">E-mail</label>
                    <input type="email" name="email" class="form-control" placeholder="contato@cliente.com">
                </div>
                <div class="col-md-7 mb-3">
                    <label class="form-label" style="font-size: 12px; color: var(--text-secondary);">Endereço Completo</label>
                    <input type="text" name="endereco" class="form-control" placeholder="Av. Principal, 123">
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label" style="font-size: 12px; color: var(--text-secondary);">Bairro</label>
                    <input type="text" name="bairro" class="form-control" placeholder="Centro">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label" style="font-size: 12px; color: var(--text-secondary);">Cidade - UF</label>
                    <input type="text" name="cidade" class="form-control" placeholder="Praia Grande - SP">
                </div>
            </div>

            <div class="d-flex justify-content-end gap-3 mt-3 pt-3 border-top" style="border-color: var(--border-subtle) !important;">
                <button type="button" class="btn-outline-custom" hx-get="data:text/html," hx-target="#form-container">Cancelar</button>
                <button type="submit" class="btn-primary-custom" style="background: var(--col-aberta); color: #fff;">
                    <i data-lucide="save" width="18" height="18" class="me-1"></i> Gravar Cliente
                </button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
