<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:hx-on="http://www.w3.org/1999/xhtml">
<body>
<div th:fragment="formularioPeca" class="glass-card mb-4" style="border: 1px solid var(--col-aguardando); box-shadow: 0 0 20px rgba(245,158,11,0.15);">
    <div class="p-3 border-bottom d-flex justify-content-between align-items-center" style="background: var(--col-aguardando-bg); border-color: var(--border-subtle) !important; border-radius: 16px 16px 0 0;">
        <h5 class="mb-0" style="font-family: var(--font-display); letter-spacing: 1px; color: var(--text-primary);"><i data-lucide="package-plus" width="20" height="20" class="me-2" style="color: var(--col-aguardando);"></i>CADASTRAR NOVA PEÇA</h5>
        <button type="button" class="btn-close btn-close-white" style="opacity: 0.5;" hx-get="data:text/html," hx-target="#form-container"></button>
    </div>

    <div class="card-body p-4">
        <form hx-post="/estoque/nova" hx-target="#container-tabela" hx-swap="outerHTML"
              hx-on:htmx:after-request="if(event.detail.successful && event.detail.target.id === 'container-tabela') document.getElementById('form-container').innerHTML = ''; lucide.createIcons();">

            <div class="row">
                <div class="col-md-3 mb-3">
                    <label class="form-label" style="font-size: 12px; color: var(--text-secondary);">Código</label>
                    <input type="text" name="codigo" class="form-control" placeholder="Opcional">
                </div>
                <div class="col-md-9 mb-3">
                    <label class="form-label" style="font-size: 12px; color: var(--text-secondary);">Descrição *</label>
                    <input type="text" name="descricao" class="form-control" required placeholder="Ex: FILTRO DE CABINE">
                </div>
            </div>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label" style="font-size: 12px; color: var(--text-secondary);">Quantidade Inicial *</label>
                    <input type="number" step="0.1" name="quantidadeEstoque" class="form-control" value="0" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label" style="font-size: 12px; color: var(--text-secondary);">Preço Custo (R$)</label>
                    <input type="number" step="0.01" name="precoCusto" class="form-control" placeholder="0.00">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label" style="font-size: 12px; color: var(--col-aguardando); font-weight: bold;">Preço Venda (R$) *</label>
                    <input type="number" step="0.01" name="precoVenda" class="form-control" style="border: 1px solid var(--col-aguardando); box-shadow: 0 0 10px rgba(245,158,11,0.1);" required placeholder="0.00">
                </div>
            </div>

            <div class="d-flex justify-content-end gap-3 mt-3 pt-3 border-top" style="border-color: var(--border-subtle) !important;">
                <button type="button" class="btn btn-outline-custom" hx-get="data:text/html," hx-target="#form-container">Cancelar</button>
                <button type="submit" class="btn-primary-custom" style="background: var(--col-aguardando); color: #fff;"><i data-lucide="save" width="18" height="18" class="me-1"></i> Salvar Peça</button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
