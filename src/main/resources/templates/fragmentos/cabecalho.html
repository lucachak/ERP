<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:hx-on="http://www.w3.org/1999/xhtml">
<body>

<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title th:text="${title}">L.</title>

    <script>
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>

    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Tom Select (Autocomplete) -->
    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.bootstrap5.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
    
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .full-mode-only { display: none !important; }
        body.full-mode .full-mode-only { display: inline-flex !important; }
        body.full-mode a.full-mode-only.btn-nav-action { display: flex !important; }
    </style>
</head>

<div th:fragment="navbar">
    <div class="bg-grid" aria-hidden="true"></div>

    <div class="navbar-elite d-flex justify-content-between align-items-center p-3 mb-4 shadow-sm">
        <div class="d-flex align-items-center gap-3">
            <button class="btn btn-nav-action d-lg-none" type="button" data-bs-toggle="offcanvas" data-bs-target="#mobileMenu" aria-controls="mobileMenu" style="padding: 6px 10px;">
                <i data-lucide="menu" width="20" height="20"></i>
            </button>
            <a href="/os" class="brand-logo">
                <i data-lucide="wind" width="24" height="24"></i> L.
            </a>

            <nav class="nav d-none d-lg-flex gap-2">
                <a class="nav-link-elite full-mode-only" href="/dashboard"><i data-lucide="layout-dashboard" width="16" height="16"></i> Dashboard</a>
                <a class="nav-link-elite" href="/estoque"><i data-lucide="package" width="16" height="16"></i> Estoque</a>
                <a class="nav-link-elite" href="/servicos-padrao"><i data-lucide="list" width="16" height="16"></i> Tab. Serviços</a>
                <a class="nav-link-elite" href="/os"><i data-lucide="file-cog" width="16" height="16"></i> O.S. (Serviços)</a>
                <a class="nav-link-elite full-mode-only" href="/os/kanban"><i data-lucide="kanban" width="16" height="16"></i> Oficina</a>
                <a class="nav-link-elite full-mode-only" href="/agenda"><i data-lucide="calendar" width="16" height="16"></i> Agenda</a>
                <a class="nav-link-elite" href="/clientes"><i data-lucide="users" width="16" height="16"></i> Clientes</a>
                <a sec:authorize="hasRole('ADMIN')" class="nav-link-elite" href="/usuarios"><i data-lucide="user-cog" width="16" height="16"></i> Usuários</a>
                <a class="nav-link-elite full-mode-only" href="/caixa"><i data-lucide="wallet" width="16" height="16"></i> Financeiro</a>
            </nav>
        </div>

        <div class="d-flex align-items-center gap-3">

            <button id="btn-theme-toggle" class="btn-nav-action" title="Mudar Tema">
                <span id="icon-sun" style="display: none;"><i data-lucide="sun" width="16" height="16"></i></span>
                <span id="icon-moon" style="display: none;"><i data-lucide="moon" width="16" height="16"></i></span>
            </button>

            <button id="btn-unlock-site" class="btn-nav-action" title="Desbloquear Site Completo">
                <i data-lucide="unlock" width="16" height="16"></i>
            </button>

            <!-- Backup button hidden in light version, but visible in full mode -->
            <a sec:authorize="hasRole('ADMIN')" href="/backup/download" class="btn-nav-action full-mode-only" title="Backup Base de Dados">
                <i data-lucide="database-backup" width="16" height="16"></i>
            </a>
            <a href="/perfil" class="btn-nav-action text-decoration-none" style="border: none;" title="Meu Perfil">
                <i data-lucide="circle-user-round" width="16" height="16" style="color: var(--text-secondary);"></i>
                <span sec:authentication="name" style="text-transform: capitalize; color: var(--text-primary);">User</span>
            </a>
            <form th:action="@{/logout}" method="post" class="m-0">
                <button type="submit" class="btn-nav-action" style="color: var(--text-secondary);" title="Sair">
                    <i data-lucide="log-out" width="16" height="16"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- Offcanvas Mobile Menu -->
    <div class="offcanvas offcanvas-start" tabindex="-1" id="mobileMenu" aria-labelledby="mobileMenuLabel" style="background: var(--bg-surface); border-right: 1px solid var(--border-subtle);">
        <div class="offcanvas-header border-bottom" style="border-color: var(--border-subtle) !important; padding: 20px 24px;">
            <h5 class="offcanvas-title brand-logo m-0" id="mobileMenuLabel"><i data-lucide="wind" width="24" height="24"></i> L.</h5>
            <button type="button" class="btn-close btn-close-white" style="opacity: 0.5;" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body p-4">
            <div class="d-flex flex-column gap-3">
                <a class="nav-link-elite mobile full-mode-only" href="/dashboard" style="font-size: 16px; padding: 12px;"><i data-lucide="layout-dashboard" width="20" height="20"></i> Dashboard</a>
                <a class="nav-link-elite mobile" href="/estoque" style="font-size: 16px; padding: 12px;"><i data-lucide="package" width="20" height="20"></i> Estoque</a>
                <a class="nav-link-elite mobile" href="/servicos-padrao" style="font-size: 16px; padding: 12px;"><i data-lucide="list" width="20" height="20"></i> Tab. Serviços</a>
                <a class="nav-link-elite mobile" href="/os" style="font-size: 16px; padding: 12px;"><i data-lucide="file-cog" width="20" height="20"></i> O.S. (Serviços)</a>
                <a class="nav-link-elite mobile full-mode-only" href="/os/kanban" style="font-size: 16px; padding: 12px;"><i data-lucide="kanban" width="20" height="20"></i> Oficina</a>
                <a class="nav-link-elite mobile full-mode-only" href="/agenda" style="font-size: 16px; padding: 12px;"><i data-lucide="calendar" width="20" height="20"></i> Agenda</a>
                <a class="nav-link-elite mobile" href="/clientes" style="font-size: 16px; padding: 12px;"><i data-lucide="users" width="20" height="20"></i> Clientes</a>
                <a sec:authorize="hasRole('ADMIN')" class="nav-link-elite mobile" href="/usuarios" style="font-size: 16px; padding: 12px;"><i data-lucide="user-cog" width="20" height="20"></i> Usuários</a>
                <a class="nav-link-elite mobile full-mode-only" href="/caixa" style="font-size: 16px; padding: 12px;"><i data-lucide="wallet" width="20" height="20"></i> Financeiro</a>
            </div>
            
            <div class="mt-auto pt-4 pb-2 border-top" style="border-color: var(--border-subtle) !important; position: absolute; bottom: 20px; width: calc(100% - 48px);">
                <a href="/perfil" class="d-flex align-items-center gap-3 mb-3 text-decoration-none p-2" style="background: rgba(255,255,255,0.05); border-radius: 8px;">
                    <i data-lucide="circle-user-round" width="20" height="20" style="color: var(--text-secondary);"></i>
                    <span sec:authentication="name" style="text-transform: capitalize; font-weight: 600; color: var(--text-primary);">User</span>
                </a>
                <form th:action="@{/logout}" method="post" class="m-0">
                    <button type="submit" class="btn-primary-custom w-100 justify-content-center" style="background: var(--col-danger-bg); color: var(--col-danger);">
                        <i data-lucide="log-out" width="18" height="18"></i> Sair do Sistema
                    </button>
                </form>
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1100;"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Lógica do Menu Ativo
            const currentPath = window.location.pathname;
            const navLinks = document.querySelectorAll('.nav-link-elite');
            let bestMatch = null; let longestMatch = 0;
            navLinks.forEach(link => {
                const href = link.getAttribute('href');
                if (currentPath === href || (href !== '/' && currentPath.startsWith(href))) {
                    if (href.length > longestMatch) { bestMatch = link; longestMatch = href.length; }
                }
            });
            if (bestMatch) bestMatch.classList.add('active-menu');

            // Lógica do Tema Claro/Escuro
            const themeToggleBtn = document.getElementById('btn-theme-toggle');
            const iconSun = document.getElementById('icon-sun');
            const iconMoon = document.getElementById('icon-moon');
            const htmlEl = document.documentElement;

            function updateThemeIcon(theme) {
                if (theme === 'light') {
                    iconSun.style.display = 'none'; // No modo claro, mostra a lua (para voltar pro escuro)
                    iconMoon.style.display = 'block';
                } else {
                    iconSun.style.display = 'block'; // No modo escuro, mostra o sol
                    iconMoon.style.display = 'none';
                }
            }

            // Inicia o ícone de acordo com o que o <head> carregou
            updateThemeIcon(htmlEl.getAttribute('data-theme'));

            themeToggleBtn.addEventListener('click', () => {
                const currentTheme = htmlEl.getAttribute('data-theme');
                const newTheme = currentTheme === 'dark' ? 'light' : 'dark';

                htmlEl.setAttribute('data-theme', newTheme);
                localStorage.setItem('theme', newTheme);
                updateThemeIcon(newTheme);
            });

            // Lógica do botão de desbloqueio do site (Modo Completo)
            const unlockBtn = document.getElementById('btn-unlock-site');
            const savedMode = localStorage.getItem('full-mode') === 'true';
            if (savedMode) document.body.classList.add('full-mode');

            unlockBtn.addEventListener('click', () => {
                const isCurrentlyFull = document.body.classList.contains('full-mode');
                
                if (!isCurrentlyFull) {
                    const password = prompt("Digite a senha para desbloquear o sistema completo:");
                    if (password === "lucas lucachak") {
                        document.body.classList.add('full-mode');
                        localStorage.setItem('full-mode', 'true');
                        alert("Sistema desbloqueado com sucesso!");
                    } else if (password !== null) {
                        alert("Senha incorreta!");
                    }
                } else {
                    document.body.classList.remove('full-mode');
                    localStorage.setItem('full-mode', 'false');
                }
            });

            if (typeof lucide !== 'undefined') lucide.createIcons();
        });

        document.body.addEventListener('htmx:afterSwap', function() { if (typeof lucide !== 'undefined') lucide.createIcons(); });
    </script>
</div>
</body>
</html>
