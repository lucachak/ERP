<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="sucessoToast" class="toast align-items-center border-0 mb-2 show" style="background: var(--col-encerrada-bg); border-left: 4px solid var(--col-encerrada); color: var(--text-primary); backdrop-filter: blur(16px); box-shadow: 0 4px 20px rgba(34,197,94,0.2);" role="alert" aria-live="assertive" aria-atomic="true">
    <div class="d-flex">
        <div class="toast-body d-flex align-items-center gap-2 fw-semibold">
            <i data-lucide="check-circle" style="color: var(--col-encerrada);" width="18" height="18"></i>
            <span th:text="${mensagemSucesso}"></span>
        </div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" style="opacity: 0.5;" data-bs-dismiss="toast" aria-label="Close"></button>
    </div>
</div>

<div th:fragment="erroToast" class="toast align-items-center border-0 mb-2 show" style="background: var(--col-danger-bg); border-left: 4px solid var(--col-danger); color: var(--text-primary); backdrop-filter: blur(16px); box-shadow: 0 4px 20px rgba(239,68,68,0.2);" role="alert" aria-live="assertive" aria-atomic="true">
    <div class="d-flex">
        <div class="toast-body d-flex align-items-center gap-2 fw-semibold">
            <i data-lucide="alert-circle" style="color: var(--col-danger);" width="18" height="18"></i>
            <span th:text="${mensagemErro}"></span>
        </div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" style="opacity: 0.5;" data-bs-dismiss="toast" aria-label="Close"></button>
    </div>
</div>

</body>
</html>
