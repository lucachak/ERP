<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragmentos/cabecalho :: head('Nova O.S. - Cambiomatic')}"></head>

<body>
<div th:replace="~{fragmentos/cabecalho :: navbar}"></div>

<div class="container mt-4 mb-5" style="max-width: 900px;">

    <div class="glass-card mb-4" style="border: 1px solid var(--col-aberta); box-shadow: 0 0 20px rgba(59,130,246,0.15);">
        <div class="p-3 border-bottom d-flex justify-content-between align-items-center" style="background: var(--col-aberta-bg); border-color: var(--border-subtle) !important; border-radius: 16px 16px 0 0;">
            <h5 class="mb-0" style="font-family: var(--font-display); letter-spacing: 1px; color: var(--text-primary);"><i data-lucide="file-plus-2" width="20" height="20" class="me-2" style="color: var(--col-aberta);"></i>ABERTURA DE NOVA O.S.</h5>
            <a href="/os" class="btn-close btn-close-white" style="opacity: 0.5;"></a>
        </div>
        <div class="card-body p-4">

            <form action="/os/nova" method="post">

                <h6 class="pb-2 mb-3" style="color: var(--col-aberta); font-weight: 600; font-size: 14px; text-transform: uppercase; letter-spacing: 1px;">1. Dados do Cliente</h6>

                <div class="d-flex gap-4 mb-4 pb-3 border-bottom" style="border-color: var(--border-subtle) !important;">
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="tipoClienteToggle" id="tipoExistente" value="existente" checked onchange="toggleCliente()">
                        <label class="form-check-label text-primary" for="tipoExistente" style="font-weight: 600;">
                            <i data-lucide="users" width="16" height="16" class="me-1"></i> Selecionar Cliente Existente
                        </label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="tipoClienteToggle" id="tipoNovo" value="novo" onchange="toggleCliente()">
                        <label class="form-check-label text-success" for="tipoNovo" style="font-weight: 600;">
                            <i data-lucide="user-plus" width="16" height="16" class="me-1"></i> Cadastrar Novo Cliente
                        </label>
                    </div>
                </div>

                <div id="blocoClienteExistente" class="row mb-3">
                    <div class="col-md-12">
                        <label class="form-label" style="font-size: 14px; color: var(--text-secondary);">Selecione o Cliente *</label>
                        <select name="clienteId" id="inputClienteId" class="form-select" style="background-color: var(--bg-surface);" required>
                            <option value="">-- Clique para escolher o cliente --</option>
                            <option th:each="c : ${clientes}" th:value="${c.id}" th:text="${c.nome + ' | CPF/CNPJ: ' + (c.cpfCnpj != null ? c.cpfCnpj : 'Não informado')}"></option>
                        </select>
                    </div>
                </div>

                <div id="blocoClienteNovo" style="display: none;">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label" style="font-size: 14px; color: var(--text-secondary);">Nome do Novo Cliente *</label>
                            <input type="text" name="clienteNome" id="inputClienteNome" class="form-control" placeholder="Ex: JOÃO SILVA">
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label" style="font-size: 14px; color: var(--text-secondary);">CPF / CNPJ</label>
                            <input type="text" name="cpfCnpj" class="form-control" placeholder="Apenas números">
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label" style="font-size: 14px; color: var(--text-secondary);">Celular</label>
                            <input type="text" name="celular" class="form-control" placeholder="(11) 9...">
                        </div>
                    </div>
                </div>

                <h6 class="pb-2 mb-3 mt-4 border-top pt-4" style="border-color: var(--border-subtle) !important; color: var(--col-aberta); font-weight: 600; font-size: 14px; text-transform: uppercase; letter-spacing: 1px;">2. Dados do Veículo</h6>
                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label" style="font-size: 14px; color: var(--text-secondary);">Placa / Chassi / Nº Série</label>
                        <input type="text" name="placa" class="form-control" style="font-family: var(--font-mono); text-transform: uppercase;" placeholder="ABC-1234">
                    </div>
                    <div class="col-md-5 mb-3">
                        <label class="form-label" style="font-size: 14px; color: var(--text-secondary);">Modelo *</label>
                        <input type="text" name="veiculoModelo" class="form-control" required placeholder="Ex: Celta 2012 / Ar Split">
                    </div>
                    <div class="col-md-3 mb-3">
                        <label class="form-label" style="font-size: 14px; color: var(--text-secondary);">Cor</label>
                        <input type="text" name="veiculoCor" class="form-control" placeholder="Opcional">
                    </div>
                </div>
                <div class="row mb-3">
                    <div class="col-md-4 mb-2">
                        <label class="form-label" style="font-size: 14px; color: var(--text-secondary);">Ano</label>
                        <input type="text" name="ano" class="form-control" placeholder="Ex: 2012">
                    </div>
                </div>

                <h6 class="pb-2 mb-3 mt-4 border-top pt-4" style="border-color: var(--border-subtle) !important; color: var(--col-aberta); font-weight: 600; font-size: 14px; text-transform: uppercase; letter-spacing: 1px;">3. Atendimento</h6>
                <div class="row mb-3">
                    <div class="col-md-12 mb-2">
                        <label class="form-label" style="font-size: 14px; color: var(--text-secondary);">Problema Reclamado *</label>
                        <textarea name="problemaReclamado" class="form-control" rows="2" required placeholder="Descreva o defeito relatado..."></textarea>
                    </div>
                </div>

                <div class="d-flex justify-content-end gap-3 mt-4 pt-3 border-top" style="border-color: var(--border-subtle) !important;">
                    <a href="/os" class="btn-outline-custom">Cancelar</a>
                    <button type="submit" class="btn-primary-custom" style="background: var(--col-encerrada);">
                        <i data-lucide="arrow-right-circle" width="18" height="18"></i> Criar O.S. e Adicionar Peças
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    function toggleCliente() {
        const tipo = document.querySelector('input[name="tipoClienteToggle"]:checked').value;
        const blocoExistente = document.getElementById('blocoClienteExistente');
        const blocoNovo = document.getElementById('blocoClienteNovo');
        const inputClienteId = document.getElementById('inputClienteId');
        const inputClienteNome = document.getElementById('inputClienteNome');

        if (tipo === 'existente') {
            blocoExistente.style.display = 'block';
            blocoNovo.style.display = 'none';
            inputClienteId.required = true;
            inputClienteNome.required = false;
            inputClienteNome.value = ''; // Limpa o campo de nome para não nflitar
        } else {
            blocoExistente.style.display = 'none';
            blocoNovo.style.display = 'block';
            inputClienteId.required = false;
            inputClienteId.value = ''; // Limpa a seleção do select
            inputClienteNome.required = true;
        }
    }
</script>

</body>
</html>
